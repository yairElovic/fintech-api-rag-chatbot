version: '3.8'

services:
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE

  app:
    build: .
    depends_on:
      - chromadb
    env_file:
      - .env
    volumes:
      - ./data:/app/data

volumes:
  chroma_data: